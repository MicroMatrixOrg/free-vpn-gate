services:
  micromatrix-vpn:
    build:
      context: .
    image: ghcr.io/micromatrixorg/free-vpn-gate:latest
    ports:
      - "${UI_BIND_HOST:-0.0.0.0}:${UI_PORT:-8787}:${UI_PORT:-8787}"                 # Web 管理后台
      - "${LOCAL_PROXY_BIND_HOST:-127.0.0.1}:${LOCAL_PROXY_PORT:-7928}:${LOCAL_PROXY_PORT:-7928}" # 本地代理仅默认绑定宿主机回环地址
    cap_add:
      - NET_ADMIN               # OpenVPN 创建 tun 网卡必须
      - SYS_MODULE              # 加载内核模块（部分系统需要）
    devices:
      - /dev/net/tun:/dev/net/tun   # TUN 设备，OpenVPN 必须
    volumes:
      - ./vpn_data:/data    # 持久化节点缓存、认证配置、日志
    environment:
      - VPNGATE_DATA_DIR=/data
      - LOCAL_PROXY_HOST=${LOCAL_PROXY_HOST:-0.0.0.0}
      - LOCAL_PROXY_PORT=${LOCAL_PROXY_PORT:-7928}
      - UI_HOST=${UI_HOST:-0.0.0.0}
      - UI_PORT=${UI_PORT:-8787}
      - UI_USERNAME=${UI_USERNAME:-}
      - UI_PASSWORD=${UI_PASSWORD:-}
      - UI_SECRET_PATH=${UI_SECRET_PATH:-}
      - TARGET_VALID_NODES=${TARGET_VALID_NODES:-3}
      - NODE_TEST_BATCH_SIZE=${NODE_TEST_BATCH_SIZE:-24}
      - PREFERRED_COUNTRY=${PREFERRED_COUNTRY:-}
      - PREFERRED_NODE_TYPE=${PREFERRED_NODE_TYPE:-}
      # 可选：通过上游代理连接 VPN（如果宿主机已有其他代理）
      # - OPENVPN_UPSTREAM_SOCKS=${OPENVPN_UPSTREAM_SOCKS:-127.0.0.1:10808}
    restart: unless-stopped
