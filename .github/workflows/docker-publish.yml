name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'          # Trigger on version tags like v1.0.0, v2.3.1
  workflow_dispatch:       # Allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with the exact version from the git tag (e.g. v1.2.3 -> 1.2.3)
            type=semver,pattern={{version}}
            # Tag with major.minor (e.g. v1.2.3 -> 1.2)
            type=semver,pattern={{major}}.{{minor}}
            # Tag with major only (e.g. v1.2.3 -> 1)
            type=semver,pattern={{major}}
            # Tag latest on version tag pushes
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Fallback tag for manual workflow_dispatch runs (no git tag present)
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
